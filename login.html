<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Treasure Fortune - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-purple: #5b21b6;
            --primary-purple-dark: #3b0764;
            --primary-purple-light: #7c3aed;
            --accent-orange: #f97316;
            --accent-orange-light: #fb923c;
            --text-dark: #1f2937;
            --text-gray: #6b7280;
            --text-light: #9ca3af;
            --white: #ffffff;
            --bg-light: #f3f4f6;
        }

        body {
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(180deg, var(--primary-purple) 0%, var(--primary-purple-dark) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            position: relative;
            overflow: hidden;
        }

        /* Background pattern */
        body::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -20%;
            width: 600px;
            height: 600px;
            background: rgba(255,255,255,0.03);
            border-radius: 50%;
            pointer-events: none;
        }

        /* Page container */
        .page {
            display: none;
            width: 100%;
            max-width: 420px;
            animation: fadeIn 0.4s ease;
        }

        .page.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Card container */
        .auth-card {
            background: var(--white);
            border-radius: 2rem;
            padding: 2.5rem 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            position: relative;
            z-index: 1;
        }

        /* Logo section */
        .logo-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            margin-bottom: 2rem;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #fde047 0%, #fbbf24 100%);
            border-radius: 0.75rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
            box-shadow: 0 4px 6px rgba(251, 191, 36, 0.3);
            transform: rotate(-5deg);
        }

        .logo-text {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--primary-purple);
            letter-spacing: -0.02em;
        }

        /* Header text */
        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .auth-title {
            font-size: 1.75rem;
            font-weight: 800;
            color: var(--text-dark);
            margin-bottom: 0.5rem;
            line-height: 1.2;
        }

        .auth-subtitle {
            font-size: 1rem;
            color: var(--text-gray);
            font-weight: 400;
        }

        /* Form styles */
        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-label {
            display: block;
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 0.5rem;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-icon {
            position: absolute;
            left: 1rem;
            color: var(--text-light);
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .form-input {
            width: 100%;
            padding: 1rem 1rem 1rem 3rem;
            border: 2px solid #e5e7eb;
            border-radius: 1rem;
            font-family: inherit;
            font-size: 1rem;
            color: var(--text-dark);
            background: var(--white);
            transition: all 0.3s ease;
            outline: none;
        }

        .form-input::placeholder {
            color: var(--text-light);
        }

        .form-input:focus {
            border-color: var(--primary-purple);
            box-shadow: 0 0 0 4px rgba(91, 33, 182, 0.1);
        }

        /* Button styles */
        .auth-btn {
            width: 100%;
            padding: 1rem;
            margin-top: 0.5rem;
            background: linear-gradient(135deg, var(--accent-orange-light) 0%, var(--accent-orange) 100%);
            color: var(--white);
            border: none;
            border-radius: 1rem;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            box-shadow: 0 10px 15px -3px rgba(249, 115, 22, 0.3);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .auth-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s ease;
        }

        .auth-btn:hover::before {
            left: 100%;
        }

        .auth-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 25px -5px rgba(249, 115, 22, 0.4);
        }

        .auth-btn:active {
            transform: translateY(0);
        }

        .btn-icon {
            font-size: 1.1rem;
        }

        /* Footer link */
        .auth-footer {
            text-align: center;
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid #f3f4f6;
        }

        .footer-text {
            color: var(--text-gray);
            font-size: 0.95rem;
        }

        .footer-link {
            color: var(--primary-purple);
            font-weight: 700;
            text-decoration: none;
            cursor: pointer;
            transition: color 0.3s ease;
        }

        .footer-link:hover {
            color: var(--primary-purple-dark);
            text-decoration: underline;
        }

        /* Back button */
        .back-btn {
            position: absolute;
            top: 1.5rem;
            left: 1.5rem;
            color: rgba(255,255,255,0.9);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s ease;
            z-index: 10;
        }

        .back-btn:hover {
            color: var(--white);
            transform: translateX(-3px);
        }

        /* Loading state */
        .auth-btn.loading {
            opacity: 0.8;
            cursor: not-allowed;
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: var(--white);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: none;
        }

        .auth-btn.loading .btn-text {
            display: none;
        }

        .auth-btn.loading .btn-icon {
            display: none;
        }

        .auth-btn.loading .spinner {
            display: block;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Error message */
        .error-message {
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #dc2626;
            padding: 0.75rem 1rem;
            border-radius: 0.75rem;
            font-size: 0.875rem;
            margin-bottom: 1rem;
            display: none;
            align-items: center;
            gap: 0.5rem;
        }

        .error-message.show {
            display: flex;
        }

        /* Success animation */
        .success-check {
            width: 60px;
            height: 60px;
            background: #22c55e;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            color: white;
            font-size: 2rem;
            animation: scaleIn 0.5s ease;
            display: none;
        }

        .success-check.show {
            display: flex;
        }

        @keyframes scaleIn {
            from { transform: scale(0); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        /* Responsive */
        @media (max-width: 480px) {
            .auth-card {
                padding: 2rem 1.5rem;
                border-radius: 1.5rem;
            }

            .auth-title {
                font-size: 1.5rem;
            }

            .logo-text {
                font-size: 1.25rem;
            }
        }

        /* Shake animation for error */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .shake {
            animation: shake 0.5s ease;
        }
    </style>
</head>
<body>

    <!-- Back to Home Link -->
    <a href="./mainTreasure.html" class="back-btn" onclick="goHome()">
        <span>←</span>
        <span>Back</span>
    </a>

    <!-- ==================== LOGIN PAGE ==================== -->
    <div id="loginPage" class="page active">
        <div class="auth-card">
            <!-- Logo -->
            <div class="logo-container">
                <div class="logo-icon">💎</div>
                <span class="logo-text">Treasure Fortune</span>
            </div>

            <!-- Header -->
            <div class="auth-header">
                <h1 class="auth-title">Welcome Back</h1>
                <p class="auth-subtitle">Login to access your account</p>
            </div>

            <!-- Error Message -->
            <div class="error-message" id="loginError">
                <span>⚠</span>
                <span id="loginErrorText">Invalid credentials</span>
            </div>

            <!-- Success Check -->
            <div class="success-check" id="loginSuccess">✓</div>

            <!-- Form -->
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <div class="input-wrapper">
                        <span class="input-icon">✉</span>
                        <input 
                            type="email" 
                            class="form-input" 
                            placeholder="Enter your email" 
                            id="loginEmail"
                            required
                        >
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Password</label>
                    <div class="input-wrapper">
                        <span class="input-icon">🔒</span>
                        <input 
                            type="password" 
                            class="form-input" 
                            placeholder="Enter your password" 
                            id="loginPassword"
                            required
                        >
                    </div>
                </div>

                <button type="submit" class="auth-btn" id="loginBtn">
                    <span class="btn-icon">➡</span>
                    <span class="btn-text">Login</span>
                    <div class="spinner"></div>
                </button>
            </form>

            <!-- Footer -->
            <!-- <div class="auth-footer">
                <p class="footer-text">
                    Don't have an account? 
                    <span class="footer-link" onclick="showPage('registerPage')">Sign Up</span>
                </p>
            </div> -->
        </div>
    </div>

    
    <script>
        // ==================== PAGE NAVIGATION ====================
        function showPage(pageId) {
            // Hide all pages
            document.querySelectorAll('.page').forEach(page => {
                page.classList.remove('active');
            });
            
            // Show target page
            document.getElementById(pageId).classList.add('active');
            
            // Clear error messages
            hideErrors();
        }

        function goHome() {
            // In a real app, this would navigate to the home page
            alert('Navigating to home page...');
        }

        function hideErrors() {
            document.querySelectorAll('.error-message').forEach(err => {
                err.classList.remove('show');
            });
        }

        // ==================== FORM HANDLING ====================
        
        // Simple user storage (in real app, use backend)
        let users = JSON.parse(localStorage.getItem('tf_users')) || [];
        let currentUser = null;

        function showError(elementId, message) {
            const errorEl = document.getElementById(elementId);
            const textEl = document.getElementById(elementId + 'Text');
            textEl.textContent = message;
            errorEl.classList.add('show');
            
            // Shake animation
            const card = document.querySelector('.auth-card');
            card.classList.add('shake');
            setTimeout(() => card.classList.remove('shake'), 500);
        }

        function setLoading(btnId, isLoading) {
            const btn = document.getElementById(btnId);
            if (isLoading) {
                btn.classList.add('loading');
                btn.disabled = true;
            } else {
                btn.classList.remove('loading');
                btn.disabled = false;
            }
        }

        // ==================== LOGIN ====================
        function handleLogin(e) {
            e.preventDefault();
            hideErrors();

            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            // Validate
            if (!email || !password) {
                showError('loginError', 'Please fill in all fields');
                return;
            }

            // Show loading
            setLoading('loginBtn', true);

            // Simulate API call
            setTimeout(() => {
                // Check credentials
                const user = users.find(u => u.email === email && u.password === password);
                
                if (user) {
                    currentUser = user;
                    localStorage.setItem('tf_currentUser', JSON.stringify(user));
                    
                    // Show success
                    document.getElementById('loginSuccess').classList.add('show');
                    document.getElementById('loginForm').style.display = 'none';
                    
                    // Redirect to dashboard
                    setTimeout(() => {
                        showPage('dashboardPage');
                    }, 1000);
                } else {
                    setLoading('loginBtn', false);
                    showError('loginError', 'Invalid email or password');
                }
            }, 1500);
        }

       
        // ==================== LOGOUT ====================
        function logout() {
            currentUser = null;
            localStorage.removeItem('tf_currentUser');
            
            // Reset forms
            document.getElementById('loginForm').reset();
            document.getElementById('registerForm').reset();
            document.getElementById('loginForm').style.display = 'block';
            document.getElementById('loginSuccess').classList.remove('show');
            
            showPage('loginPage');
        }

        // ==================== INIT ====================
        // Check if user is already logged in
        const savedUser = localStorage.getItem('tf_currentUser');
        if (savedUser) {
            currentUser = JSON.parse(savedUser);
            showPage('dashboardPage');
        }

        // Add enter key support
        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const activePage = document.querySelector('.page.active');
                if (activePage.id === 'loginPage') {
                    document.getElementById('loginBtn').click();
                } else if (activePage.id === 'registerPage') {
                    document.getElementById('registerBtn').click();
                }
            }
        });
    </script>
</body>
</html>
